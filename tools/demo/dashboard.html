<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Demo App — Payment</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f4f5f7; margin: 0; padding: 40px; }
  nav { color: #888; font-size: 13px; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1);
          width: 360px; padding: 24px; }
  h2 { font-size: 16px; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: #555; margin: 12px 0 4px; }
  input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  button { margin-top: 20px; padding: 10px 20px; background: #2d6cdf; color: #fff;
           border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
  <nav>Home → Payments → New payment</nav>
  <div class="card" id="payment-form">
    <h2>New payment</h2>
    <label for="recipient">Recipient account</label>
    <input type="text" id="recipient" placeholder="KZ00 0000 0000 0000 0000">
    <label for="amount">Amount</label>
    <input type="text" id="amount" placeholder="0.00">
    <label for="purpose">Payment purpose</label>
    <select id="purpose">
      <option>Utility payment</option>
      <option>Transfer to own account</option>
    </select>
    <button type="button">Confirm</button>
  </div>
</body>
</html>
